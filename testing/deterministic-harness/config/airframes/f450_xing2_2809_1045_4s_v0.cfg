# Harness-facing airframe profile copied from the current MARV Gazebo HIL
# handoff. Keep physics, actuator mapping, and controller gains separate so the
# same validation path can later use a measured real-drone profile.

airframe.name=f450_xing2_2809_1045_4s_v0
frame.body=FLU
frame.x_axis=forward
frame.y_axis=left
frame.z_axis=up
runtime.gyro_frame=bridge_frd
# Hardware-source runtime signs from the MARV F450 motor/output handoff. Treat
# these as the source of truth; Gazebo must be adjusted until live G0 matches
# this table, not the other way around.
# Order per motor: roll,pitch,yaw in bridge SENSOR gyro axes.
runtime.motor.1.signs=-1,1,1
runtime.motor.2.signs=1,-1,1
runtime.motor.3.signs=1,1,-1
runtime.motor.4.signs=-1,-1,-1

